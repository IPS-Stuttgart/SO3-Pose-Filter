name: KIT AMASS Sample Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  kit-sample-smoke:
    name: Download KIT sample and run smoke experiment
    runs-on: ubuntu-latest
    env:
      KIT_WEBDAV_URL: ${{ secrets.KIT_WEBDAV_URL }}
      KIT_DATA_KEY: ${{ secrets.KIT_DATA_KEY }}
      KIT_DATA_PASSWORD: ${{ secrets.KIT_DATA_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Prepare KIT AMASS sample
        uses: ./.github/actions/prepare-amass-sample
        with:
          default-output-dir: data/kit_secret_sample
          report-path: runs/kit_sample_download_report.json
          max-files: "1"
          cache-key: so3-pose-filter-kit-sample-${{ runner.os }}-files1-v1
          webdav-url-env: KIT_WEBDAV_URL
          key-env: KIT_DATA_KEY
          password-env: KIT_DATA_PASSWORD
          source-name: KIT_WEBDAV_URL

      - name: Build trimmed smoke subset and config
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          import numpy as np

          source = Path("data/kit_secret_sample/sample.npz")
          trimmed_dir = Path("data/kit_secret_sample_trimmed")
          trimmed_dir.mkdir(parents=True, exist_ok=True)
          trimmed = trimmed_dir / "sample_trimmed.npz"

          with np.load(source, allow_pickle=False) as data:
              poses = data["poses"]
              n_frames = min(int(poses.shape[0]), 240)
              payload = {}
              for key in data.files:
                  value = data[key]
                  if value.shape[:1] == poses.shape[:1]:
                      payload[key] = value[:n_frames]
                  else:
                      payload[key] = value
          np.savez(trimmed, **payload)

          config = {
              "data_root": str(trimmed_dir),
              "dataset_subset": "",
              "frame_rate": 20,
              "num_joints": 23,
              "noise_deg": 12.0,
              "occlusion_prob": 0.25,
              "num_particles": 96,
              "transition_model": "persistence",
              "filter_backend": "numpy",
              "output_dir": "runs/kit_sample",
              "seed": 23,
              "max_sequences": 1,
              "min_frames": 2,
              "train_fraction": 1.0,
              "val_fraction": 0.0,
              "rollout_horizon": 10,
              "robustness_noise_deg": [10.0],
              "robustness_occlusion_prob": [0.25],
              "process_noise_deg": 3.0,
              "proposal_gain": 0.2,
          }
          Path("runs/kit_sample_config.json").write_text(
              json.dumps(config, indent=2),
              encoding="utf-8",
          )
          print(json.dumps({"trimmed_frames": n_frames, "config": config}, indent=2))
          PY

      - name: Run KIT sample smoke experiment
        run: |
          python scripts/run_experiment.py --config runs/kit_sample_config.json

      - name: Validate KIT smoke outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path("runs/kit_sample/summary.json")
          report_path = Path("runs/kit_sample_download_report.json")

          assert summary_path.exists(), "missing KIT smoke summary"
          assert report_path.exists(), "missing download report"

          summary = json.loads(summary_path.read_text(encoding="utf-8"))
          report = json.loads(report_path.read_text(encoding="utf-8"))
          means = summary["filter_metrics_mean"]

          assert summary["num_joints"] == 23
          assert summary["num_sequences"] == 1
          assert report["source"] == "KIT_WEBDAV_URL"
          assert report["files"][0]["metadata"]["poses_shape"][1] >= 72
          assert means["filter_error_deg"] >= 0.0
          assert means["observed_error_deg"] >= 0.0

          print("KIT smoke summary:", means)
          PY

      - name: Upload KIT smoke artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kit-amass-smoke-results
          path: |
            runs/kit_sample_download_report.json
            runs/kit_sample_config.json
            runs/kit_sample/summary.json
            runs/kit_sample/*.csv
            runs/kit_sample/plots/*.svg
