name: Prepare Dataset Caches

on:
  workflow_dispatch:
    inputs:
      runs_on_json:
        description: JSON array for runs-on. Use self-hosted labels to warm a persistent runner-local dataset path.
        required: true
        default: '["ubuntu-latest"]'
      sample_file_count:
        description: Number of AMASS .npz files to cache for each sample dataset.
        required: true
        default: "1"
      cache_version:
        description: Cache version suffix. Bump this to replace an existing GitHub Actions cache key.
        required: true
        default: v1
      force_redownload:
        description: Replace the self-hosted local cache before downloading. For GitHub cache replacement, also bump cache_version.
        required: true
        type: boolean
        default: false
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.runs_on_json || 'ubuntu-latest' }}
  cancel-in-progress: false

jobs:
  prepare-sample-caches:
    name: Prepare ${{ matrix.label }} sample cache
    runs-on: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.runs_on_json) || '["ubuntu-latest"]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ACCAD
            slug: accad
            cache_prefix: so3-pose-filter-accad-sample
            workspace_dir: data/accad_secret_sample
            report_path: runs/accad_sample_cache_prepare_report.json
            manifest_path: runs/accad_sample_cache_manifest.txt
            source_name: ACCAD_DATA_WEBDAV_URL
            webdav_url_env: ACCAD_DATA_WEBDAV_URL
            key_env: ACCAD_DATA_KEY
            password_env: ACCAD_DATA_PASSWORD
          - label: KIT
            slug: kit
            cache_prefix: so3-pose-filter-kit-sample
            workspace_dir: data/kit_secret_sample
            report_path: runs/kit_sample_cache_prepare_report.json
            manifest_path: runs/kit_sample_cache_manifest.txt
            source_name: KIT_WEBDAV_URL
            webdav_url_env: KIT_WEBDAV_URL
            key_env: KIT_DATA_KEY
            password_env: KIT_DATA_PASSWORD
    env:
      ACCAD_DATA_WEBDAV_URL: ${{ secrets.ACCAD_DATA_WEBDAV_URL }}
      ACCAD_DATA_KEY: ${{ secrets.ACCAD_DATA_KEY }}
      ACCAD_DATA_PASSWORD: ${{ secrets.ACCAD_DATA_PASSWORD }}
      KIT_WEBDAV_URL: ${{ secrets.KIT_WEBDAV_URL }}
      KIT_DATA_KEY: ${{ secrets.KIT_DATA_KEY }}
      KIT_DATA_PASSWORD: ${{ secrets.KIT_DATA_PASSWORD }}
      SAMPLE_FILE_COUNT: ${{ (github.event_name == 'workflow_dispatch' && inputs.sample_file_count) || '1' }}
      CACHE_VERSION: ${{ (github.event_name == 'workflow_dispatch' && inputs.cache_version) || 'v1' }}
      FORCE_REDOWNLOAD: ${{ (github.event_name == 'workflow_dispatch' && inputs.force_redownload) || false }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package for AMASS validation
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Ensure ${{ matrix.label }} AMASS sample
        id: amass-sample
        uses: ./.github/actions/ensure-amass-webdav-sample
        with:
          label: ${{ matrix.label }}
          slug: ${{ matrix.slug }}
          data-root: ${{ matrix.workspace_dir }}
          report-path: ${{ matrix.report_path }}
          manifest-path: ${{ matrix.manifest_path }}
          max-files: ${{ env.SAMPLE_FILE_COUNT }}
          cache-key: ${{ matrix.cache_prefix }}-${{ runner.os }}-files${{ env.SAMPLE_FILE_COUNT }}-${{ env.CACHE_VERSION }}
          cache-version: ${{ env.CACHE_VERSION }}
          source-name: ${{ matrix.source_name }}
          webdav-url-env: ${{ matrix.webdav_url_env }}
          key-env: ${{ matrix.key_env }}
          password-env: ${{ matrix.password_env }}
          force-redownload: ${{ env.FORCE_REDOWNLOAD }}

      - name: Upload cache preparation report
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.slug }}-sample-cache-prepare
          path: |
            ${{ matrix.report_path }}
            ${{ matrix.manifest_path }}
