name: Full-Data ACCAD Motion-Stratified Benchmark

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: Config JSON for the full-data run.
        required: true
        default: configs/private_accad_eval.example.json
      output_dir:
        description: Local output directory on the self-hosted runner.
        required: true
        default: runs/full_data_motion_stratified_private_accad_eval
      artifact_name_prefix:
        description: Prefix for the sanitized public paper artifact.
        required: true
        default: bayescatrack-accad-motion-stratified-full
      artifact_retention_days:
        description: Number of days to retain the uploaded artifact.
        required: true
        default: "90"
      max_hash_mb:
        description: Maximum file size in MB for SHA-256 hashing in run_manifest.json.
        required: true
        default: "100"
      run_tests_first:
        description: Run lightweight tests before the full benchmark.
        required: true
        type: boolean
        default: true
      clean_output_dir:
        description: Remove output_dir before running.
        required: true
        type: boolean
        default: true
      torch_device:
        description: Device override for config patching. Use auto, cpu, or cuda.
        required: true
        default: auto
      max_segments_override:
        description: Optional integer override for max_segments. Leave empty to use config.
        required: false
        default: ""

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: full-data-motion-stratified-accad
  cancel-in-progress: false

jobs:
  full-data-motion-stratified-accad:
    name: Full-data private ACCAD benchmark on self-hosted runner
    runs-on: [self-hosted, so3-pose-filter-full-data]
    timeout-minutes: 4320
    env:
      CONFIG_PATH: ${{ inputs.config_path }}
      OUTPUT_DIR: ${{ inputs.output_dir }}
      PACKAGED_ARTIFACT_DIR: runs/paper_artifact_full_data_motion_stratified
      DATA_ROOT: ${{ secrets.ACCAD_DATA_ROOT }}
      TORCH_DEVICE: ${{ inputs.torch_device }}
      MAX_SEGMENTS_OVERRIDE: ${{ inputs.max_segments_override }}
      MAX_HASH_MB: ${{ inputs.max_hash_mb }}

    steps:
      - name: Refuse unsafe invocation context
        run: |
          set -euo pipefail
          if [ "${{ github.repository }}" != "FlorianPfaff/SO3-Pose-Filter" ]; then
            echo "This workflow is intended only for FlorianPfaff/SO3-Pose-Filter." >&2
            exit 1
          fi
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "This workflow is manual-only." >&2
            exit 1
          fi
          if [ -z "${DATA_ROOT}" ]; then
            echo "Missing secret ACCAD_DATA_ROOT. Store the full-data path as a repository or environment secret." >&2
            exit 1
          fi
          if [ ! -d "${DATA_ROOT}" ]; then
            echo "Configured ACCAD_DATA_ROOT does not exist on this runner." >&2
            exit 1
          fi
          case "${TORCH_DEVICE}" in
            auto|cpu|cuda) ;;
            *) echo "torch_device must be auto, cpu, or cuda." >&2; exit 1 ;;
          esac

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package, Torch extras, and PyRecEst main
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[torch]"
          python -m pip install --upgrade "git+https://github.com/FlorianPfaff/PyRecEst.git@main"

      - name: Run lightweight tests first
        if: ${{ inputs.run_tests_first == true || inputs.run_tests_first == 'true' }}
        run: |
          set -euo pipefail
          python -m unittest discover -s tests

      - name: Prepare full-data config
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          config_path = Path(os.environ["CONFIG_PATH"])
          config = json.loads(config_path.read_text(encoding="utf-8"))
          config["source_data_root"] = os.environ["DATA_ROOT"]
          config["output_dir"] = os.environ["OUTPUT_DIR"]
          config["gru_device"] = os.environ["TORCH_DEVICE"]
          override = os.environ.get("MAX_SEGMENTS_OVERRIDE", "").strip()
          if override:
              config["max_segments"] = int(override)
          prepared = Path("runs/full_data_motion_stratified_config.json")
          prepared.parent.mkdir(parents=True, exist_ok=True)
          prepared.write_text(json.dumps(config, indent=2), encoding="utf-8")
          print(json.dumps({
              "prepared_config": str(prepared),
              "output_dir": os.environ["OUTPUT_DIR"],
              "max_segments": config.get("max_segments"),
              "benchmark_methods": config.get("benchmark_methods"),
              "benchmark_seeds": config.get("benchmark_seeds"),
              "benchmark_num_particles": config.get("benchmark_num_particles"),
              "benchmark_noise_deg": config.get("benchmark_noise_deg"),
              "benchmark_occlusion_prob": config.get("benchmark_occlusion_prob"),
              "gru_device": config.get("gru_device"),
          }, indent=2))
          PY

      - name: Clean previous outputs
        if: ${{ inputs.clean_output_dir == true || inputs.clean_output_dir == 'true' }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          for key in ["OUTPUT_DIR", "PACKAGED_ARTIFACT_DIR"]:
              path = Path(os.environ[key])
              if path.exists():
                  shutil.rmtree(path)
          PY

      - name: Run full-data motion-stratified evaluation
        run: |
          set -euo pipefail
          python scripts/run_motion_stratified_private_accad_eval.py \
            --config runs/full_data_motion_stratified_config.json \
            --data-root "$DATA_ROOT" \
            --output "$OUTPUT_DIR"

      - name: Validate full-data outputs
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import json
          import os
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          required = [
              output_dir / "motion_stratified_private_accad_eval_summary.json",
              output_dir / "motion_stratified_private_accad_eval_summary.md",
              output_dir / "aggregate_benchmark_metrics_by_motion_bin.csv",
              output_dir / "aggregate_transition_metrics_by_motion_bin.csv",
              output_dir / "aggregate_method_means_by_motion_bin.csv",
              output_dir / "aggregate_method_means_by_noise_occlusion_motion.csv",
          ]
          for path in required:
              assert path.exists(), f"missing required artifact: {path}"
          summary = json.loads(required[0].read_text(encoding="utf-8"))
          assert summary["motion_bin_counts"], "no motion bins were produced"
          assert summary["method_means_by_motion_bin"], "no method means were produced"
          with required[4].open(newline="", encoding="utf-8") as handle:
              rows = list(csv.DictReader(handle))
          assert rows, "aggregate_method_means_by_motion_bin.csv is empty"
          validation = {
              "motion_bins": sorted(summary["motion_bin_counts"].keys()),
              "motion_bin_counts": summary["motion_bin_counts"],
              "methods": sorted({row["method"] for row in rows}),
              "row_count": len(rows),
              "run_count": len(summary.get("runs", [])),
          }
          (output_dir / "motion_stratified_validation.json").write_text(json.dumps(validation, indent=2), encoding="utf-8")
          print(json.dumps(validation, indent=2))
          PY

      - name: Write reproducibility manifest
        run: |
          set -euo pipefail
          python scripts/write_experiment_manifest.py \
            --experiment-name accad-motion-stratified-full-data \
            --config runs/full_data_motion_stratified_config.json \
            --result-root "$OUTPUT_DIR" \
            --output "$OUTPUT_DIR/run_manifest.json" \
            --source-data-root "ACCADDATA-SECRET" \
            --max-hash-mb "$MAX_HASH_MB"

      - name: Build public-safe paper artifact package
        run: |
          set -euo pipefail
          python scripts/package_paper_artifact.py \
            --result-root "$OUTPUT_DIR" \
            --output-dir "$PACKAGED_ARTIFACT_DIR"

      - name: Upload sanitized full-data paper artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name_prefix }}-${{ github.run_number }}-${{ github.sha }}
          retention-days: ${{ inputs.artifact_retention_days }}
          path: ${{ env.PACKAGED_ARTIFACT_DIR }}
