name: ACCAD AMASS Sample Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  accad-sample-smoke:
    name: Download ACCAD sample and run smoke experiment
    runs-on: ubuntu-latest
    env:
      ACCAD_DATA_WEBDAV_URL: ${{ secrets.ACCAD_DATA_WEBDAV_URL }}
      ACCAD_DATA_KEY: ${{ secrets.ACCAD_DATA_KEY }}
      ACCAD_DATA_PASSWORD: ${{ secrets.ACCAD_DATA_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore ACCAD sample cache
        id: accad-sample-cache
        uses: actions/cache/restore@v5
        with:
          path: data/accad_secret_sample
          key: so3-pose-filter-accad-sample-${{ runner.os }}-files1-v1

      - name: Install rclone without sudo
        if: ${{ steps.accad-sample-cache.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          if ! command -v rclone >/dev/null 2>&1; then
            mkdir -p "$RUNNER_TEMP/rclone-bin" "$RUNNER_TEMP/rclone-download/extract"
            curl -fsSL https://downloads.rclone.org/rclone-current-linux-amd64.zip \
              -o "$RUNNER_TEMP/rclone-download/rclone.zip"
            python -m zipfile -e \
              "$RUNNER_TEMP/rclone-download/rclone.zip" \
              "$RUNNER_TEMP/rclone-download/extract"
            RCLONE_BIN="$(find "$RUNNER_TEMP/rclone-download/extract" -type f -name rclone | head -n 1)"
            if [ -z "$RCLONE_BIN" ]; then
              echo "Downloaded rclone archive did not contain rclone binary" >&2
              exit 1
            fi
            cp "$RCLONE_BIN" "$RUNNER_TEMP/rclone-bin/rclone"
            chmod 755 "$RUNNER_TEMP/rclone-bin/rclone"
            echo "$RUNNER_TEMP/rclone-bin" >> "$GITHUB_PATH"
            export PATH="$RUNNER_TEMP/rclone-bin:$PATH"
          fi
          rclone version

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Download and validate ACCAD AMASS sample
        if: ${{ steps.accad-sample-cache.outputs.cache-hit != 'true' }}
        run: |
          python scripts/download_webdav_amass_sample.py \
            --output-dir data/accad_secret_sample \
            --report runs/accad_sample_download_report.json \
            --max-files 1 \
            --webdav-url-env ACCAD_DATA_WEBDAV_URL \
            --key-env ACCAD_DATA_KEY \
            --password-env ACCAD_DATA_PASSWORD \
            --source-name ACCAD_DATA_WEBDAV_URL

      - name: Write ACCAD sample cache report
        if: ${{ steps.accad-sample-cache.outputs.cache-hit == 'true' }}
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, "scripts")
          from download_amass_sample import is_amass_npz

          data_dir = Path("data/accad_secret_sample")
          files = sorted(data_dir.glob("*.npz"))
          if not files:
              raise SystemExit(f"ACCAD sample cache hit but no .npz files were found in {data_dir}")

          records = []
          for path in files:
              ok, metadata = is_amass_npz(path)
              if not ok:
                  raise SystemExit(f"Cached ACCAD sample is not a valid AMASS .npz: {path}; metadata={metadata}")
              records.append({"sample_path": str(path), "metadata": metadata})

          report = {
              "source": "ACCAD_DATA_WEBDAV_URL",
              "cache_hit": True,
              "selected_count": len(records),
              "files": records,
              "errors": [],
          }
          report_path = Path("runs/accad_sample_download_report.json")
          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(json.dumps(report, indent=2), encoding="utf-8")
          print(json.dumps(report, indent=2))
          PY

      - name: Save ACCAD sample cache
        if: ${{ steps.accad-sample-cache.outputs.cache-hit != 'true' && hashFiles('data/accad_secret_sample/*.npz') != '' }}
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: data/accad_secret_sample
          key: ${{ steps.accad-sample-cache.outputs.cache-primary-key }}

      - name: Build trimmed smoke subset and config
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          import numpy as np

          source = Path("data/accad_secret_sample/sample.npz")
          trimmed_dir = Path("data/accad_secret_sample_trimmed")
          trimmed_dir.mkdir(parents=True, exist_ok=True)
          trimmed = trimmed_dir / "sample_trimmed.npz"

          with np.load(source, allow_pickle=False) as data:
              poses = data["poses"]
              n_frames = min(int(poses.shape[0]), 240)
              payload = {}
              for key in data.files:
                  value = data[key]
                  if value.shape[:1] == poses.shape[:1]:
                      payload[key] = value[:n_frames]
                  else:
                      payload[key] = value
          np.savez(trimmed, **payload)

          config = {
              "data_root": str(trimmed_dir),
              "dataset_subset": "",
              "frame_rate": 20,
              "num_joints": 23,
              "noise_deg": 12.0,
              "occlusion_prob": 0.25,
              "num_particles": 96,
              "transition_model": "persistence",
              "filter_backend": "numpy",
              "output_dir": "runs/accad_sample",
              "seed": 11,
              "max_sequences": 1,
              "min_frames": 2,
              "train_fraction": 1.0,
              "val_fraction": 0.0,
              "rollout_horizon": 10,
              "robustness_noise_deg": [10.0],
              "robustness_occlusion_prob": [0.25],
              "process_noise_deg": 3.0,
              "proposal_gain": 0.2,
          }
          Path("runs/accad_sample_config.json").write_text(
              json.dumps(config, indent=2),
              encoding="utf-8",
          )
          print(json.dumps({"trimmed_frames": n_frames, "config": config}, indent=2))
          PY

      - name: Run ACCAD sample smoke experiment
        run: |
          python scripts/run_experiment.py --config runs/accad_sample_config.json

      - name: Validate ACCAD smoke outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path("runs/accad_sample/summary.json")
          report_path = Path("runs/accad_sample_download_report.json")

          assert summary_path.exists(), "missing ACCAD smoke summary"
          assert report_path.exists(), "missing download report"

          summary = json.loads(summary_path.read_text(encoding="utf-8"))
          report = json.loads(report_path.read_text(encoding="utf-8"))
          means = summary["filter_metrics_mean"]

          assert summary["num_joints"] == 23
          assert summary["num_sequences"] == 1
          assert report["source"] == "ACCAD_DATA_WEBDAV_URL"
          assert report["files"][0]["metadata"]["poses_shape"][1] >= 72
          assert means["filter_error_deg"] >= 0.0
          assert means["observed_error_deg"] >= 0.0

          print("ACCAD smoke summary:", means)
          PY

      - name: Upload ACCAD smoke artifacts
        uses: actions/upload-artifact@v7
        with:
          name: accad-amass-smoke-results
          path: |
            runs/accad_sample_download_report.json
            runs/accad_sample_config.json
            runs/accad_sample/summary.json
            runs/accad_sample/*.csv
            runs/accad_sample/plots/*.svg
