name: ACCAD First Results Benchmark

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  accad-first-results:
    name: PyRecEst-backed ACCAD benchmark
    runs-on: ubuntu-latest
    env:
      ACCAD_DATA_WEBDAV_URL: ${{ secrets.ACCAD_DATA_WEBDAV_URL }}
      ACCAD_DATA_KEY: ${{ secrets.ACCAD_DATA_KEY }}
      ACCAD_DATA_PASSWORD: ${{ secrets.ACCAD_DATA_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore ACCAD sample cache
        id: accad-sample-cache
        uses: actions/cache/restore@v5
        with:
          path: data/accad_secret_sample
          key: so3-pose-filter-accad-sample-${{ runner.os }}-files1-v1

      - name: Install rclone without sudo
        if: ${{ steps.accad-sample-cache.outputs.cache-hit != 'true' }}
        run: |
          set -euo pipefail
          if ! command -v rclone >/dev/null 2>&1; then
            mkdir -p "$RUNNER_TEMP/rclone-bin" "$RUNNER_TEMP/rclone-download/extract"
            curl -fsSL https://downloads.rclone.org/rclone-current-linux-amd64.zip \
              -o "$RUNNER_TEMP/rclone-download/rclone.zip"
            python -m zipfile -e \
              "$RUNNER_TEMP/rclone-download/rclone.zip" \
              "$RUNNER_TEMP/rclone-download/extract"
            RCLONE_BIN="$(find "$RUNNER_TEMP/rclone-download/extract" -type f -name rclone | head -n 1)"
            if [ -z "$RCLONE_BIN" ]; then
              echo "Downloaded rclone archive did not contain rclone binary" >&2
              exit 1
            fi
            cp "$RCLONE_BIN" "$RUNNER_TEMP/rclone-bin/rclone"
            chmod 755 "$RUNNER_TEMP/rclone-bin/rclone"
            echo "$RUNNER_TEMP/rclone-bin" >> "$GITHUB_PATH"
            export PATH="$RUNNER_TEMP/rclone-bin:$PATH"
          fi
          rclone version

      - name: Install package and PyRecEst main
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install --upgrade "git+https://github.com/FlorianPfaff/PyRecEst.git@main"

      - name: Download ACCAD AMASS sample
        if: ${{ steps.accad-sample-cache.outputs.cache-hit != 'true' }}
        run: |
          python scripts/download_webdav_amass_sample.py \
            --output-dir data/accad_secret_sample \
            --report runs/accad_first_results_download_report.json \
            --max-files 1 \
            --webdav-url-env ACCAD_DATA_WEBDAV_URL \
            --key-env ACCAD_DATA_KEY \
            --password-env ACCAD_DATA_PASSWORD \
            --source-name ACCAD_DATA_WEBDAV_URL

      - name: Write ACCAD sample cache report
        if: ${{ steps.accad-sample-cache.outputs.cache-hit == 'true' }}
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          sys.path.insert(0, "scripts")
          from download_amass_sample import is_amass_npz

          data_dir = Path("data/accad_secret_sample")
          files = sorted(data_dir.glob("*.npz"))
          if not files:
              raise SystemExit(f"ACCAD sample cache hit but no .npz files were found in {data_dir}")

          records = []
          for path in files:
              ok, metadata = is_amass_npz(path)
              if not ok:
                  raise SystemExit(f"Cached ACCAD sample is not a valid AMASS .npz: {path}; metadata={metadata}")
              records.append({"sample_path": str(path), "metadata": metadata})

          report = {
              "source": "ACCAD_DATA_WEBDAV_URL",
              "cache_hit": True,
              "selected_count": len(records),
              "files": records,
              "errors": [],
          }
          report_path = Path("runs/accad_first_results_download_report.json")
          report_path.parent.mkdir(parents=True, exist_ok=True)
          report_path.write_text(json.dumps(report, indent=2), encoding="utf-8")
          print(json.dumps(report, indent=2))
          PY

      - name: Save ACCAD sample cache
        if: ${{ steps.accad-sample-cache.outputs.cache-hit != 'true' && hashFiles('data/accad_secret_sample/*.npz') != '' }}
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: data/accad_secret_sample
          key: ${{ steps.accad-sample-cache.outputs.cache-primary-key }}

      - name: Build benchmark sequence chunks
        run: |
          python scripts/prepare_amass_windows.py \
            --data-root data/accad_secret_sample \
            --output-dir data/accad_first_results_segments \
            --report runs/accad_first_results_segments_report.json \
            --manifest runs/accad_first_results_segments_manifest.csv \
            --frame-rate 20 \
            --segment-frames 60 \
            --stride-frames 30 \
            --max-files 1 \
            --max-segments 6 \
            --selection top-motion

      - name: Run PyRecEst first-results experiment
        run: |
          python scripts/run_experiment.py --config configs/accad_first_results.example.json

      - name: Build compact transition sweep config
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(
              Path("configs/accad_first_results.example.json").read_text(
                  encoding="utf-8"
              )
          )
          config.update(
              {
                  "output_dir": "runs/accad_first_results_sweep/base",
                  "sweep_output_dir": "runs/accad_first_results_sweep",
                  "robustness_noise_deg": [config["noise_deg"]],
                  "robustness_occlusion_prob": [config["occlusion_prob"]],
                  "ablation_particle_counts": [config["num_particles"]],
                  "ablation_proposal_gains": [config["proposal_gain"]],
                  "ablation_factorized_updates": [config["factorized_update"]],
                  "ablation_resample_thresholds": [config["resample_threshold"]],
              }
          )
          Path("runs/accad_first_results_sweep_config.json").write_text(
              json.dumps(config, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Run transition model sweep
        run: |
          python scripts/run_model_sweep.py \
            --config runs/accad_first_results_sweep_config.json \
            --output runs/accad_first_results_sweep \
            --models persistence gaussian_rw learned_delta

      - name: Run compact first-results benchmark
        run: |
          python scripts/run_first_results_benchmark.py \
            --config configs/accad_first_results_benchmark.example.json \
            --output runs/accad_first_results_benchmark

      - name: Validate first-result acceptance criteria
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          summary_path = Path("runs/accad_first_results/gaussian_rw/summary.json")
          sweep_path = Path("runs/accad_first_results_sweep/comparison_metrics.csv")
          robustness_path = Path("runs/accad_first_results/gaussian_rw/robustness_metrics.csv")
          benchmark_summary_path = Path("runs/accad_first_results_benchmark/first_results_summary.json")
          benchmark_metrics_path = Path("runs/accad_first_results_benchmark/benchmark_metrics.csv")
          benchmark_heatmap_path = Path("runs/accad_first_results_benchmark/plots/tracking_error_heatmap.svg")
          benchmark_curve_path = Path("runs/accad_first_results_benchmark/plots/filter_vs_baselines.svg")

          assert summary_path.exists(), "missing first-results summary"
          assert sweep_path.exists(), "missing transition sweep metrics"
          assert robustness_path.exists(), "missing robustness metrics"
          assert benchmark_summary_path.exists(), "missing first-results benchmark summary"
          assert benchmark_metrics_path.exists(), "missing first-results benchmark metrics"
          assert benchmark_heatmap_path.exists(), "missing benchmark heatmap"
          assert benchmark_curve_path.exists(), "missing benchmark curve"

          summary = json.loads(summary_path.read_text(encoding="utf-8"))
          means = summary["filter_metrics_mean"]
          assert summary["filter_backend"] == "pyrecest"
          assert summary["transition_model"] == "gaussian_rw"
          assert means["filter_error_deg"] < means["observed_error_deg"]

          with sweep_path.open(newline="", encoding="utf-8") as handle:
              sweep_rows = list(csv.DictReader(handle))
          models = {row["model"] for row in sweep_rows}
          assert models == {"persistence", "gaussian_rw", "learned_delta"}
          gaussian_row = next(row for row in sweep_rows if row["model"] == "gaussian_rw")
          assert float(gaussian_row["filter_error_deg"]) < float(
              gaussian_row["observed_error_deg"]
          )

          with robustness_path.open(newline="", encoding="utf-8") as handle:
              robustness_rows = list(csv.DictReader(handle))
          assert len(robustness_rows) >= 9

          benchmark_summary = json.loads(benchmark_summary_path.read_text(encoding="utf-8"))
          assert benchmark_summary["methods"] == [
              "raw",
              "persistence",
              "gaussian_rw",
              "pyrecest_pf",
              "mlp_delta",
              "pyrecest_mlp_pf",
              "history_mlp_delta",
          ]
          assert benchmark_summary["row_count"] == 28
          assert benchmark_summary["acceptance"]["target_method"] == "pyrecest_pf"
          assert benchmark_summary["acceptance"]["target_beats_raw_any"]

          transition_by_model = {
              row["model"]: row
              for row in benchmark_summary["transition_metrics"]
              if row["metric"] == "one_step_error_deg"
          }
          assert "mlp_delta" in transition_by_model
          assert "history_mlp_delta" in transition_by_model
          assert "gaussian_rw" in transition_by_model
          assert float(transition_by_model["mlp_delta"]["value"]) > 0.0
          assert float(transition_by_model["history_mlp_delta"]["value"]) > 0.0

          acceptance = {
              "primary_filter_metrics_mean": means,
              "transition_sweep": sweep_rows,
              "robustness_points": len(robustness_rows),
              "benchmark": benchmark_summary,
              "criteria": {
                  "pyrecest_backend_used": True,
                  "filter_beats_raw_observations": True,
                  "persistence_baseline_reported": True,
                  "filter_beats_persistence_baseline": (
                      means["filter_error_deg"] < means["persistence_error_deg"]
                  ),
              },
          }
          Path("runs/accad_first_results_acceptance.json").write_text(
              json.dumps(acceptance, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(acceptance, indent=2))
          PY

      - name: Upload first-results artifacts
        uses: actions/upload-artifact@v7
        with:
          name: accad-first-results-benchmark
          path: |
            runs/accad_first_results_download_report.json
            runs/accad_first_results_segments_report.json
            runs/accad_first_results_segments_manifest.csv
            runs/accad_first_results_acceptance.json
            runs/accad_first_results_sweep_config.json
            runs/accad_first_results/gaussian_rw/summary.json
            runs/accad_first_results/gaussian_rw/*.csv
            runs/accad_first_results/gaussian_rw/plots/*.svg
            runs/accad_first_results_sweep/comparison_metrics.csv
            runs/accad_first_results_sweep/comparison_summary.json
            runs/accad_first_results_benchmark/first_results_summary.json
            runs/accad_first_results_benchmark/benchmark_metrics.csv
            runs/accad_first_results_benchmark/transition_metrics.csv
            runs/accad_first_results_benchmark/plots/*.svg
